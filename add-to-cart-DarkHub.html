<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkHub - Add-to-Cart </title>
    <link rel="stylesheet" href="add-to-cart-DarkHub.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-shopping-bag"></i>DarkHub.in</h2>
            </div>
            <span class="header-right">
                <span class="search-box">
                    <input type="text" id="searchInput" placeholder="Search products...">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </span>
            </span>
        </div>
    </header>

    <!-- Products Section -->
    <section class="products-section">
        <div class="container">
            <h1>Featured Products</h1>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> My Cart</h3>
            <span class="close-cart" id="closeCart">&times;</span>
        </div>
        <div class="cart-body" id="cartBody">
            <p class="empty-cart">Your cart is empty</p>
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="cart-total">
                <span>Total Items: <span id="totalItems">0</span></span>
                <span>Total Amount: ₹<span id="totalAmount">0</span></span>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <script src="add-to-cart-DarkHub.js"></script>
</body>
</html>
